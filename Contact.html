<section class="login-container">


<div class="login-box">


<i class="fa-solid fa-envelope logo"></i>


<h1>
تواصل معنا
</h1>


<p>
يسعدنا استقبال استفساراتكم ورسائلكم
</p>



<form id="contactForm" onsubmit="sendMessage(event)">



<div class="input-box">

<i class="fa-solid fa-user"></i>

<input 
type="text"
id="name"
placeholder="الاسم الكامل"
required>

</div>




<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input 
type="email"
id="email"
placeholder="البريد الإلكتروني"
required>

</div>





<div class="input-box">

<i class="fa-solid fa-message"></i>

<textarea
id="message"
placeholder="اكتب رسالتك هنا..."
required></textarea>

</div>




<button type="submit">

<i class="fa-solid fa-paper-plane"></i>

إرسال الرسالة

</button>



</form>


</div>


</section>
