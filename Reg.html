<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
    background:#B8B8DC;
    font-family:Tahoma;
}

.login-box{
    width:350px;
    background:white;
    margin:80px auto;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

h2{
    color:#4B3F72;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid gray;
    border-radius:8px;
    font-size:16px;
}

button{
    width:95%;
    padding:10px;
    background:#4B3F72;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#37295a;
}

a{
    text-decoration:none;
    color:#4B3F72;
}
</style>
</head>

<body>

<div class="login-box">

<h2>🔐 تسجيل الدخول</h2>

<form>

<input type="text" placeholder="اسم المستخدم" required>

<input type="password" placeholder="كلمة المرور" required>

<button type="submit">دخول</button>

</form>

<br>

<a href="home.html">🏠 العودة إلى الصفحة الرئيسية</a>

</div>

</body>
</html>
