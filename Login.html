<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | عيادة دكتورة أماني البيطرية</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🐾 عيادة دكتورة أماني البيطرية</h1>

    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="service.html">الخدمات</a>
        <a href="Login.html">تسجيل الدخول</a>
        <a href="Contact.html">تواصل معنا</a>
    </nav>
</header>

<section class="form-container">

    <div class="form-box">

        <h2>تسجيل الدخول</h2>

        <form id="loginForm">

            <label for="email">البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="أدخل البريد الإلكتروني" required>

            <label for="password">كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور" required>

            <button type="submit">تسجيل الدخول</button>

        </form>

    </div>

</section>

<footer>
    <p>جميع الحقوق محفوظة © 2026 عيادة دكتورة أماني البيطرية</p>
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", function(event){
    event.preventDefault();

    alert("تم تسجيل الدخول بنجاح (تجريبي)");
});
</script>

</body>
</html>
